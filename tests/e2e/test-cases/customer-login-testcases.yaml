feature: Customer Login
module: Authentication
application: QloApps

test_cases:

  - id: CL-001
    category: Positive
    title: Login with valid email and password
    steps:
      - Navigate to login page
      - Enter valid email
      - Enter valid password
      - Click Sign In
    expected_result: User is redirected to My Account page

  - id: CL-002
    category: Invalid Credentials
    title: Login with valid email and wrong password
    steps:
      - Navigate to login page
      - Enter registered email
      - Enter incorrect password
      - Click Sign In
    expected_result: Error message displayed

  - id: CL-003
    category: Invalid Credentials
    title: Login with unregistered email
    steps:
      - Navigate to login page
      - Enter unregistered email
      - Enter password
      - Click Sign In
    expected_result: Authentication error displayed

  - id: CL-004
    category: Validation
    title: Login with empty email and password
    steps:
      - Navigate to login page
      - Leave email empty
      - Leave password empty
      - Click Sign In
    expected_result: Validation error displayed

  - id: CL-005
    category: Validation
    title: Login with invalid email format
    steps:
      - Navigate to login page
      - Enter invalid email format
      - Enter password
      - Click Sign In
    expected_result: Email validation error displayed

  - id: CL-006
    category: Security
    title: SQL injection attempt in email field
    steps:
      - Navigate to login page
      - Enter SQL injection payload in email
      - Enter password
      - Click Sign In
    expected_result: Login fails and no SQL execution occurs

  - id: CL-007
    category: Security
    title: XSS script injection attempt
    steps:
      - Navigate to login page
      - Enter script tag in email field
      - Enter password
      - Click Sign In
    expected_result: Input sanitized and login fails

  - id: CL-008
    category: Navigation
    title: Verify redirect after successful login
    steps:
      - Login with valid credentials
    expected_result: User redirected to My Account page

  - id: CL-009
    category: Session
    title: Verify session persists after refresh
    steps:
      - Login successfully
      - Refresh the page
    expected_result: User remains logged in

  - id: CL-010
    category: Session
    title: Verify logout after login
    steps:
      - Login successfully
      - Click Logout
    expected_result: User redirected to login page